{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ToDo App</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- daisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center p-4">

    <div class="card bg-base-100 w-full max-w-sm shadow-xl border border-base-300">
        <div class="card-body">
            <h2 class="card-title text-2xl font-bold text-center justify-center text-primary mb-2">Selamat Datang!</h2>
            <p class="text-center text-sm text-base-content/70 mb-4">Silakan masuk ke akun ToDo App kamu</p>
            
            {% if error %}
                <div class="alert alert-error mb-4 py-2 shadow-sm">
                    <span class="text-sm text-white font-medium">{{error}}</span>
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                
                <!-- Input Username -->
                <div class="form-control mb-4">
                    <label class="label">
                        <span class="label-text font-semibold">Username</span>
                    </label>
                    <input type="text" name="username" placeholder="Masukkan username" class="input input-bordered focus:input-primary w-full" required />
                </div>
                
                <!-- Input Password -->
                <div class="form-control mb-6">
                    <label class="label">
                        <span class="label-text font-semibold">Password</span>
                    </label>
                    <input type="password" name="password" placeholder="••••••••" class="input input-bordered focus:input-primary w-full" required />
                </div>
                
                <!-- Tombol Login -->
                <div class="form-control mt-4">
                    <button type="submit" class="btn btn-primary w-full text-white">Masuk</button>
                </div>
            </form>
            
            <div class="divider my-6 text-xs text-base-content/50">ATAU</div>
            
            <p class="text-center text-sm">
                Belum punya akun? 
                <a href="{% url 'register' %}" class="link link-primary font-semibold">Daftar sekarang</a>
            </p>
        </div>
    </div>

</body>
</html>
